<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keyquill</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 360px;
        min-height: 200px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 13px;
        color: #1a1a2e;
        background: #fafafa;
        padding: 16px;
      }
      h1 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      h1 .icon {
        width: 24px;
        height: 24px;
        object-fit: contain;
        flex-shrink: 0;
      }
      .provider-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
      }
      .provider-card {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 10px 12px;
      }
      .provider-card__header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }
      .provider-card__name {
        font-weight: 600;
        font-size: 14px;
      }
      .provider-card__status {
        font-size: 11px;
        color: #16a34a;
      }
      .provider-card__meta {
        font-size: 11px;
        color: #666;
        margin-bottom: 6px;
      }
      .provider-card__actions {
        display: flex;
        gap: 6px;
      }

      /* v2: multi-key UI */
      .section {
        margin-bottom: 16px;
      }
      .section__title {
        font-size: 11px;
        font-weight: 600;
        color: #475569;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .provider-group {
        margin-bottom: 10px;
      }
      .provider-group__header {
        font-size: 10px;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
        padding: 0 2px;
      }
      .key-card {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 6px;
      }
      .key-card--default {
        border-color: #d4af37;
        box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.15);
      }
      .key-card__header {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 4px;
      }
      .key-card__label {
        font-weight: 600;
        font-size: 13px;
        color: #1a1a2e;
      }
      .key-card__badge {
        font-size: 12px;
        line-height: 1;
      }
      .key-card__meta {
        display: flex;
        gap: 10px;
        font-size: 11px;
        color: #666;
        margin-bottom: 6px;
      }
      .key-card__hint {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #94a3b8;
      }
      .key-card__model {
        color: #64748b;
      }
      .key-card__actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .binding-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        margin-bottom: 4px;
        gap: 8px;
      }
      .binding-row__info {
        display: flex;
        flex-direction: column;
        min-width: 0;
        flex: 1;
      }
      .binding-row__host {
        font-size: 12px;
        font-weight: 500;
        color: #1a1a2e;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .binding-row__key {
        font-size: 10px;
        color: #64748b;
      }
      .binding-row__actions {
        display: flex;
        gap: 4px;
      }
      .binding-row__picker {
        padding: 3px 6px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 11px;
        background: #fff;
      }
      .form__error {
        font-size: 11px;
        color: #dc2626;
        background: #fef2f2;
        padding: 6px 8px;
        border-radius: 6px;
      }
      .btn {
        border: none;
        border-radius: 6px;
        padding: 5px 10px;
        font-size: 12px;
        cursor: pointer;
        font-weight: 500;
      }
      .btn--primary {
        background: #2563eb;
        color: #fff;
      }
      .btn--primary:hover {
        background: #1d4ed8;
      }
      .btn--ghost {
        background: transparent;
        color: #ef4444;
        border: 1px solid #fecaca;
      }
      .btn--ghost:hover {
        background: #fef2f2;
      }
      .btn--secondary {
        background: #f1f5f9;
        color: #334155;
      }
      .btn--secondary:hover {
        background: #e2e8f0;
      }
      .form {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .form label {
        font-size: 12px;
        font-weight: 500;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .form input,
      .form select {
        padding: 6px 8px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        background: #fff;
      }
      .form input:focus,
      .form select:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
      }
      .form__actions {
        display: flex;
        gap: 6px;
        margin-top: 4px;
      }
      .empty {
        text-align: center;
        color: #94a3b8;
        padding: 24px 0;
      }
      .empty p {
        margin-bottom: 8px;
      }
      .hint {
        font-size: 11px;
        color: #94a3b8;
        margin-top: 12px;
        line-height: 1.5;
      }
      .test-result {
        font-size: 12px;
        margin-top: 4px;
      }
      .test-result--ok {
        color: #16a34a;
      }
      .test-result--fail {
        color: #ef4444;
      }
      .connected-sites {
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid #e0e0e0;
      }
      .connected-sites h2 {
        font-size: 12px;
        font-weight: 600;
        color: #475569;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .site-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        margin-bottom: 4px;
      }
      .site-row__info {
        display: flex;
        flex-direction: column;
        min-width: 0;
        flex: 1;
      }
      .site-row__host {
        font-size: 12px;
        font-weight: 500;
        color: #1a1a2e;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .site-row__date {
        font-size: 10px;
        color: #94a3b8;
      }
      .btn--sm {
        padding: 3px 8px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./App.tsx"></script>
  </body>
</html>
